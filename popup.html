<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 220px; font-family: sans-serif; padding: 15px; background: #2f3640; color: white; text-align: center; margin: 0; }
        h2 { margin-top: 0; color: #f5f6fa; font-size: 18px; }
        p { font-size: 14px; color: #dcdde1; }
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #btn-bloquear { background: #e84118; color: white; }
        #btn-bloquear:hover { background: #c23616; }
        #btn-desbloquear { background: #2ed573; color: white; margin-top: 5px; }
        #btn-desbloquear:hover { background: #27ae60; }
    </style>
</head>
<body>
    <h2>🚨 O Fiscal</h2>
    <p>Gerenciar site atual:</p>
    <button id="btn-bloquear">Bloquear</button>
    <button id="btn-desbloquear">Desbloquear</button>
    
    <script src="popup.js"></script>
</body>
</html>
